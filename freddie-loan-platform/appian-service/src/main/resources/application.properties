spring.application.name=appian-service
server.port=8093

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:appiandb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# Eureka Client Configuration
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}

# Kafka Consumer Configuration
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=appian-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.freddieapp.*
spring.kafka.listener.ack-mode=manual

# Actuator & Tracing Configuration
management.endpoints.web.exposure.include=health,info,prometheus
management.tracing.sampling.probability=1.0

# Logging Level
logging.level.com.freddieapp.appian=INFO

# Appian API Integration Properties
appian.api.url=${APPIAN_API_URL:https://mock-appian-env.appiancloud.com/suite/webapi}
appian.api.username=${APPIAN_API_USERNAME:appian-integration-user}
appian.api.password=${APPIAN_API_PASSWORD:AppianPassCodeMock2026!}
appian.api.simulation-mode=${APPIAN_API_SIMULATION_MODE:true}
