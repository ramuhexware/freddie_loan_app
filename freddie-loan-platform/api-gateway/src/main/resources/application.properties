spring.application.name=api-gateway

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Routes
spring.cloud.gateway.routes[0].id=customer-service
spring.cloud.gateway.routes[0].uri=lb://customer-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/customers/**
spring.cloud.gateway.routes[0].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[0].filters[0].args.name=customer-service-cb
spring.cloud.gateway.routes[0].filters[0].args.fallbackUri=forward:/fallback/customer-service

spring.cloud.gateway.routes[1].id=loan-origination-service
spring.cloud.gateway.routes[1].uri=lb://loan-origination-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/loans/**
spring.cloud.gateway.routes[1].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[1].filters[0].args.name=loan-service-cb
spring.cloud.gateway.routes[1].filters[0].args.fallbackUri=forward:/fallback/loan-service

spring.cloud.gateway.routes[2].id=underwriting-service
spring.cloud.gateway.routes[2].uri=lb://underwriting-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/underwriting/**
spring.cloud.gateway.routes[2].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[2].filters[0].args.name=underwriting-service-cb

spring.cloud.gateway.routes[3].id=document-service
spring.cloud.gateway.routes[3].uri=lb://document-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/documents/**

spring.cloud.gateway.routes[4].id=legacy-adapter-service
spring.cloud.gateway.routes[4].uri=lb://legacy-adapter-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/legacy/**
spring.cloud.gateway.routes[4].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[4].filters[0].args.name=legacy-adapter-cb

spring.cloud.gateway.routes[5].id=card-service
spring.cloud.gateway.routes[5].uri=lb://card-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/cards/**
spring.cloud.gateway.routes[5].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[5].filters[0].args.name=card-service-cb

spring.cloud.gateway.routes[6].id=report-service
spring.cloud.gateway.routes[6].uri=lb://report-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/v1/reports/**
spring.cloud.gateway.routes[6].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[6].filters[0].args.name=report-service-cb

spring.cloud.gateway.routes[7].id=appian-service
spring.cloud.gateway.routes[7].uri=lb://appian-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/v1/appian/**
spring.cloud.gateway.routes[7].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[7].filters[0].args.name=appian-service-cb

server.port=8080

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true

management.endpoints.web.exposure.include=health,info,prometheus,gateway
management.endpoint.health.show-details=when-authorized
management.health.redis.enabled=false
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

logging.level.org.springframework.cloud.gateway=INFO
logging.level.com.freddieapp.apigateway=INFO

# Springdoc OpenAPI Aggregations
springdoc.swagger-ui.urls[0].name=Customer Service
springdoc.swagger-ui.urls[0].url=/customer-service/api-docs
springdoc.swagger-ui.urls[1].name=Loan Origination Service
springdoc.swagger-ui.urls[1].url=/loan-origination-service/v3/api-docs
springdoc.swagger-ui.urls[2].name=Underwriting Service
springdoc.swagger-ui.urls[2].url=/underwriting-service/v3/api-docs
springdoc.swagger-ui.urls[3].name=Appian Service
springdoc.swagger-ui.urls[3].url=/appian-service/v3/api-docs

