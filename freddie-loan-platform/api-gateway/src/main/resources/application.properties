spring.application.name=api-gateway

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Routes
spring.cloud.gateway.routes[0].id=customer-service
spring.cloud.gateway.routes[0].uri=lb://customer-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/customers/**
spring.cloud.gateway.routes[0].filters[0].name=RequestRateLimiter
spring.cloud.gateway.routes[0].filters[0].args.redis-rate-limiter.replenishRate=100
spring.cloud.gateway.routes[0].filters[0].args.redis-rate-limiter.burstCapacity=200
spring.cloud.gateway.routes[0].filters[0].args.redis-rate-limiter.requestedTokens=1
spring.cloud.gateway.routes[0].filters[1].name=CircuitBreaker
spring.cloud.gateway.routes[0].filters[1].args.name=customer-service-cb
spring.cloud.gateway.routes[0].filters[1].args.fallbackUri=forward:/fallback/customer-service

spring.cloud.gateway.routes[1].id=loan-origination-service
spring.cloud.gateway.routes[1].uri=lb://loan-origination-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/loans/**
spring.cloud.gateway.routes[1].filters[0].name=RequestRateLimiter
spring.cloud.gateway.routes[1].filters[0].args.redis-rate-limiter.replenishRate=50
spring.cloud.gateway.routes[1].filters[0].args.redis-rate-limiter.burstCapacity=100
spring.cloud.gateway.routes[1].filters[1].name=CircuitBreaker
spring.cloud.gateway.routes[1].filters[1].args.name=loan-service-cb
spring.cloud.gateway.routes[1].filters[1].args.fallbackUri=forward:/fallback/loan-service

spring.cloud.gateway.routes[2].id=underwriting-service
spring.cloud.gateway.routes[2].uri=lb://underwriting-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/underwriting/**
spring.cloud.gateway.routes[2].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[2].filters[0].args.name=underwriting-service-cb

spring.cloud.gateway.routes[3].id=document-service
spring.cloud.gateway.routes[3].uri=lb://document-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/documents/**
spring.cloud.gateway.routes[3].filters[0].name=RequestRateLimiter
spring.cloud.gateway.routes[3].filters[0].args.redis-rate-limiter.replenishRate=30
spring.cloud.gateway.routes[3].filters[0].args.redis-rate-limiter.burstCapacity=60

spring.cloud.gateway.routes[4].id=legacy-adapter-service
spring.cloud.gateway.routes[4].uri=lb://legacy-adapter-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/legacy/**
spring.cloud.gateway.routes[4].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[4].filters[0].args.name=legacy-adapter-cb

spring.cloud.gateway.routes[5].id=card-service
spring.cloud.gateway.routes[5].uri=lb://card-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/cards/**
spring.cloud.gateway.routes[5].filters[0].name=RequestRateLimiter
spring.cloud.gateway.routes[5].filters[0].args.redis-rate-limiter.replenishRate=50
spring.cloud.gateway.routes[5].filters[0].args.redis-rate-limiter.burstCapacity=100
spring.cloud.gateway.routes[5].filters[1].name=CircuitBreaker
spring.cloud.gateway.routes[5].filters[1].args.name=card-service-cb

spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/freddie-platform
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/realms/freddie-platform/protocol/openid-connect/certs

server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

management.endpoints.web.exposure.include=health,info,prometheus,gateway
management.endpoint.health.show-details=when-authorized
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

logging.level.org.springframework.cloud.gateway=INFO
logging.level.com.freddieapp.apigateway=INFO
