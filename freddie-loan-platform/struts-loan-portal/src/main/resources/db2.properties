# =============================================================================
# DB2 Connection Properties — Freddie Mac Struts Loan Portal
# =============================================================================
# Replace placeholder values with your actual DB2 credentials
# =============================================================================

# DB2 JDBC Driver class
db2.driverClassName=com.ibm.db2.jcc.DB2Driver

# DB2 Connection URL
# Format: jdbc:db2://<host>:<port>/<database>
db2.url=jdbc:db2://localhost:50000/FREDDIE

# DB2 Credentials
db2.username=freddie_usr
db2.password=freddie_pass

# DB2 Schema
db2.schema=FREDDIE_LOANS

# =============================================================================
# HikariCP Connection Pool Settings
# =============================================================================
db2.pool.maximumPoolSize=20
db2.pool.minimumIdle=5
db2.pool.connectionTimeout=30000
db2.pool.idleTimeout=600000
db2.pool.maxLifetime=1800000
db2.pool.poolName=FreddieDB2Pool
db2.pool.connectionTestQuery=SELECT 1 FROM SYSIBM.SYSDUMMY1
