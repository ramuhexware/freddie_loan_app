spring:
  application:
    name: loan-origination-service

  datasource:
    url: jdbc:oracle:thin:@localhost:1521/FREEPDB1
    username: freddie_loans
    password: freddie_secret
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 15
      minimum-idle: 5
      pool-name: LoanHikariPool
      data-source-properties:
        oracle.jdbc.fanEnabled: false

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        default_schema: FREDDIE_LOANS

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      enable.idempotence: true
      properties:
        spring.json.add.type.headers: true

  activemq:
    broker-url: tcp://localhost:61616
    user: admin
    password: admin

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/freddie-platform

server:
  port: 8082

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

feign:
  circuitbreaker:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

logging:
  level:
    com.freddieapp.loanorigination: INFO
