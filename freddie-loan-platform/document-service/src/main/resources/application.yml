spring:
  application:
    name: document-service

  data:
    mongodb:
      uri: mongodb://freddie_admin:freddie_secret@localhost:27017/freddie_documents?authSource=admin
      auto-index-creation: false  # Managed via @Document index annotations

  activemq:
    broker-url: tcp://localhost:61616
    user: admin
    password: admin

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/freddie-platform

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 55MB

server:
  port: 8084

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

logging:
  level:
    com.freddieapp.documentservice: INFO
