spring:
  application:
    name: underwriting-service

  datasource:
    url: jdbc:db2://localhost:50000/FREDUWR
    username: freddie_uw
    password: freddie_secret
    driver-class-name: com.ibm.db2.jcc.DB2Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 3
      pool-name: UnderwritingHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.DB2Dialect
        default_schema: FREDDIE_UW

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: underwriting-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.freddieapp.*"

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/freddie-platform

server:
  port: 8083

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

resilience4j:
  circuitbreaker:
    instances:
      credit-bureau-api:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s

logging:
  level:
    com.freddieapp.underwriting: INFO
