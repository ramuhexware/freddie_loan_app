spring.application.name=underwriting-service

spring.datasource.driver-class-name=com.ibm.db2.jcc.DB2Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.pool-name=UnderwritingHikariPool

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.DB2Dialect
spring.jpa.properties.hibernate.default_schema=FREDDIE_UW

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=underwriting-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.freddieapp.*

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/freddie-platform

server.port=8083

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

management.endpoints.web.exposure.include=health,info,prometheus
management.tracing.sampling.probability=1.0

resilience4j.circuitbreaker.instances.credit-bureau-api.sliding-window-size=10
resilience4j.circuitbreaker.instances.credit-bureau-api.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.credit-bureau-api.wait-duration-in-open-state=60s

logging.level.com.freddieapp.underwriting=INFO
