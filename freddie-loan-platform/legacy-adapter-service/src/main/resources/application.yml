spring:
  application:
    name: legacy-adapter-service

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/freddie-platform

server:
  port: 8088

legacy:
  soap:
    osb:
      endpoint:
        loan-eligibility: http://osb-host:7001/osbws/LoanEligibilityService
        customer-verification: http://osb-host:7001/osbws/CustomerVerificationService
    wss:
      username: freddie-adapter-svc
      password: ${LEGACY_WSS_PASSWORD}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

resilience4j:
  circuitbreaker:
    instances:
      legacy-loan-eligibility:
        sliding-window-size: 5
        failure-rate-threshold: 60
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 2
      legacy-customer-verification:
        sliding-window-size: 5
        failure-rate-threshold: 60
        wait-duration-in-open-state: 60s
  retry:
    instances:
      legacy-loan-eligibility:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
      legacy-customer-verification:
        max-attempts: 3
        wait-duration: 2s

logging:
  level:
    com.freddieapp.legacyadapter: INFO
    org.springframework.ws: DEBUG
